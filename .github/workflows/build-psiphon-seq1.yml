name: Build Psiphon AAR (go.Seq1)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Clone psiphon-tunnel-core
        run: |
          git clone --depth=1 \
            https://github.com/Psiphon-Labs/psiphon-tunnel-core.git \
            $HOME/psiphon-tunnel-core

      - name: Clone golang.org/x/mobile
        run: |
          git clone --depth=1 \
            https://github.com/golang/mobile.git \
            $HOME/mobile

      - name: Patch mobile (Seq to Seq1 + bypass mobileModuleAvailable check)
        run: |
          cd $HOME/mobile

          # 1. Patch Seq.java
          find . -name "Seq.java" | while read f; do
            sed -i -e 's/\bclass Seq\b/class Seq1/g' -e 's/"GoSeq"/"GoSeq1"/g' "$f"
          done

          # 2. Patch .go files: go.Seq -> go.Seq1
          grep -rl 'go\.Seq\b\|"go/Seq"' . --include="*.go" | while read f; do
            sed -i -e 's|"go/Seq"|"go/Seq1"|g' -e 's|\bgo\.Seq\b|go.Seq1|g' "$f"
          done

          # 3. Patch .go files: go.Universe -> go.Universe1
          grep -rl 'go\.Universe\b\|"go/Universe"\|class Universe\b' . --include="*.go" | while read f; do
            sed -i -e 's|"go/Universe"|"go/Universe1"|g' \
                   -e 's|\bgo\.Universe\b|go.Universe1|g' \
                   -e 's|\bclass Universe\b|class Universe1|g' "$f"
          done

          # 4. Patch mobileModuleAvailable() trong bind.go: luôn return true
          BIND_GO="cmd/gomobile/bind.go"
          sed -i 's/func mobileModuleAvailable() bool {/func mobileModuleAvailable() bool { return true \/\//' "$BIND_GO"
          echo "=== mobileModuleAvailable after patch ==="
          grep -A3 "mobileModuleAvailable" "$BIND_GO" | head -10

      - name: Build patched gomobile and gobind
        run: |
          cd $HOME/mobile
          go mod tidy
          go build -o $HOME/go/bin/gomobile ./cmd/gomobile
          go build -o $HOME/go/bin/gobind   ./cmd/gobind
          echo "$HOME/go/bin" >> $GITHUB_PATH
          gomobile version || true

      - name: Create wrapper module
        run: |
          mkdir -p $HOME/psi-wrapper
          cd $HOME/psi-wrapper

          printf 'module psi-wrapper\n\ngo 1.21\n\nrequire (\n\tgithub.com/Psiphon-Labs/psiphon-tunnel-core v0.0.0\n\tgolang.org/x/mobile v0.0.0\n)\n\nreplace (\n\tgithub.com/Psiphon-Labs/psiphon-tunnel-core => %s\n\tgolang.org/x/mobile => %s\n)\n' \
            "$HOME/psiphon-tunnel-core" "$HOME/mobile" > go.mod

          touch go.sum

          printf 'package main\n\nfunc main() {}\n' > main.go

          go mod tidy || true

          echo "=== go.mod ==="
          cat go.mod

      - name: gomobile init
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018
          cd $HOME/psi-wrapper
          gomobile init

      - name: Build Psiphon AAR
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018
          cd $HOME/psi-wrapper
          gomobile bind \
            -target android/arm64,android/arm,android/386,android/amd64 \
            -androidapi 21 \
            -o $GITHUB_WORKSPACE/psiphon-seq1.aar \
            github.com/Psiphon-Labs/psiphon-tunnel-core/MobileLibrary/psi

      - name: Verify AAR contains Seq1
        run: |
          unzip -p psiphon-seq1.aar classes.jar > /tmp/classes.jar
          jar tf /tmp/classes.jar | grep -E "Seq|Universe|psi|go/"
          jar tf /tmp/classes.jar | grep "Seq1" \
            && echo "OK go/Seq1 confirmed" \
            || echo "FAIL go/Seq1 NOT found"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: psiphon-seq1-aar
          path: psiphon-seq1.aar
          
