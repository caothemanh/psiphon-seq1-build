name: Build Psiphon AAR (go.Seq1)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Clone psiphon-tunnel-core
        run: |
          git clone --depth=1 \
            https://github.com/Psiphon-Labs/psiphon-tunnel-core.git \
            $HOME/psiphon-tunnel-core

      - name: Clone golang.org/x/mobile
        run: |
          git clone --depth=1 \
            https://github.com/golang/mobile.git \
            $HOME/mobile

      # ── Inspect thực tế cấu trúc repo mobile ─────────────────────
      - name: Inspect mobile repo structure
        run: |
          echo "=== Top level ==="
          ls $HOME/mobile/
          echo ""
          echo "=== bind/ ==="
          ls $HOME/mobile/bind/
          echo ""
          echo "=== bind/java/ ==="
          ls $HOME/mobile/bind/java/
          echo ""
          echo "=== All .go files mentioning go.Seq ==="
          grep -rl '"go\.Seq\|go/Seq\|go\.Universe\|go/Universe"' \
            $HOME/mobile/ --include="*.go" 2>/dev/null || \
          grep -rl 'go\.Seq\|go/Seq\|go\.Universe\|go/Universe' \
            $HOME/mobile/ --include="*.go" | head -20

      # ── Patch: dùng find thay vì hardcode path ───────────────────
      - name: Patch mobile (Seq → Seq1)
        run: |
          cd $HOME/mobile

          echo "=== Patch bind/java/Seq.java ==="
          find . -name "Seq.java" | while read f; do
            echo "Patching: $f"
            sed -i \
              -e 's/\bclass Seq\b/class Seq1/g' \
              -e 's/"GoSeq"/"GoSeq1"/g' \
              "$f"
            grep -n "Seq1\|class Seq" "$f" | head -5
          done

          echo ""
          echo "=== Patch all .go files with go.Seq / go/Seq references ==="
          grep -rl 'go\.Seq\b\|"go/Seq"' . --include="*.go" | while read f; do
            echo "Patching: $f"
            sed -i \
              -e 's|"go/Seq"|"go/Seq1"|g' \
              -e 's|\bgo\.Seq\b|go.Seq1|g' \
              "$f"
          done

          echo ""
          echo "=== Patch all .go files with go.Universe / go/Universe references ==="
          grep -rl 'go\.Universe\b\|"go/Universe"\|class Universe\b' . --include="*.go" | while read f; do
            echo "Patching: $f"
            sed -i \
              -e 's|"go/Universe"|"go/Universe1"|g' \
              -e 's|\bgo\.Universe\b|go.Universe1|g' \
              -e 's|\bclass Universe\b|class Universe1|g' \
              "$f"
          done

          echo ""
          echo "=== Verify: remaining un-patched go.Seq refs ==="
          grep -rn 'go\.Seq[^1]' . --include="*.go" | grep -v "_test.go" || echo "✅ None found"
          grep -rn '"go/Seq"[^1]' . --include="*.go" || echo "✅ None found"

      # ── Build gomobile + gobind từ source đã patch ────────────────
      - name: Build patched gomobile + gobind
        run: |
          cd $HOME/mobile
          go mod tidy
          go build -o $HOME/go/bin/gomobile ./cmd/gomobile
          go build -o $HOME/go/bin/gobind   ./cmd/gobind
          echo "$HOME/go/bin" >> $GITHUB_PATH
          echo "=== gomobile version ==="
          $HOME/go/bin/gomobile version || true

      # ── Inject replace vào go.mod psiphon ────────────────────────
      - name: Inject replace directive
        run: |
          cd $HOME/psiphon-tunnel-core

          if grep -q "golang.org/x/mobile" go.mod; then
            go mod edit -replace=golang.org/x/mobile=$HOME/mobile
            echo "✅ Replaced existing golang.org/x/mobile"
          else
            go mod edit -require=golang.org/x/mobile@v0.0.0
            go mod edit -replace=golang.org/x/mobile=$HOME/mobile
            echo "✅ Added + replaced golang.org/x/mobile"
          fi

          go mod tidy || echo "⚠️  go mod tidy warning (continuing)"
          echo "=== go.mod replace section ==="
          grep -A2 "replace" go.mod || true

      # ── gomobile init ─────────────────────────────────────────────
      - name: gomobile init
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018
          gomobile init

      # ── Build AAR ─────────────────────────────────────────────────
      - name: Build Psiphon AAR
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018
          cd $HOME/psiphon-tunnel-core/MobileLibrary/psi

          gomobile bind \
            -target android/arm64,android/arm,android/386,android/amd64 \
            -androidapi 21 \
            -o $GITHUB_WORKSPACE/psiphon-seq1.aar \
            .

      # ── Verify ────────────────────────────────────────────────────
      - name: Verify AAR contains Seq1
        run: |
          unzip -p psiphon-seq1.aar classes.jar > /tmp/classes.jar
          echo "=== classes in AAR ==="
          jar tf /tmp/classes.jar | grep -E "Seq|Universe|psi|go/"
          echo ""
          jar tf /tmp/classes.jar | grep "Seq1" \
            && echo "✅ go/Seq1 confirmed" \
            || echo "❌ go/Seq1 NOT found"

      # ── Upload ────────────────────────────────────────────────────
      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: psiphon-seq1-aar
          path: psiphon-seq1.aar
          
