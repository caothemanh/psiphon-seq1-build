name: Build Psiphon AAR (go.Seq1)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Clone psiphon-tunnel-core
        run: |
          git clone --depth=1 \
            https://github.com/Psiphon-Labs/psiphon-tunnel-core.git \
            $HOME/psiphon-tunnel-core

      - name: Clone golang.org/x/mobile
        run: |
          git clone --depth=1 \
            https://github.com/golang/mobile.git \
            $HOME/mobile

      # ── List thực tế các file trong bind/java để debug ────────────
      - name: Inspect mobile/bind/java
        run: |
          echo "=== bind/java files ==="
          ls $HOME/mobile/bind/java/
          echo ""
          echo "=== bind/ Go files with Seq reference ==="
          grep -rl "go\.Seq\|go/Seq\|\"Seq\"" $HOME/mobile/bind/ --include="*.go" | head -20

      # ── Patch Seq.java (file tĩnh duy nhất) ──────────────────────
      - name: Patch Seq.java
        run: |
          SEQ=$HOME/mobile/bind/java/Seq.java

          # Đổi tên class và log tag
          sed -i \
            -e 's/\bclass Seq\b/class Seq1/g' \
            -e 's/"GoSeq"/"GoSeq1"/g' \
            -e 's/\bSeq\.receive()/Seq1.receive()/g' \
            $SEQ

          echo "=== Seq.java after patch (head 40) ==="
          head -40 $SEQ

      # ── Patch javagen.go: nơi sinh go/Universe.java và các ref ───
      - name: Patch javagen.go
        run: |
          JAVAGEN=$HOME/mobile/bind/javagen.go

          # Thay tất cả reference Java package/class go.Seq → go.Seq1
          sed -i \
            -e 's|"go/Seq"|"go/Seq1"|g' \
            -e 's|go\.Seq\b|go.Seq1|g' \
            -e 's|"go/Universe"|"go/Universe1"|g' \
            -e 's|go\.Universe\b|go.Universe1|g' \
            -e 's|class Universe\b|class Universe1|g' \
            $JAVAGEN

          echo "=== javagen.go Seq/Universe refs ==="
          grep -n "Seq1\|Universe1\|go/Seq\|go/Universe" $JAVAGEN | head -30

      # ── Patch các file Go khác trong bind/ có reference go.Seq ────
      - name: Patch remaining bind/*.go files
        run: |
          # Tìm tất cả file Go còn reference go.Seq hoặc go/Seq
          FILES=$(grep -rl '"go/Seq"\|go\.Seq\b\|"go/Universe"\|go\.Universe\b' \
            $HOME/mobile/bind/ --include="*.go")

          if [ -n "$FILES" ]; then
            echo "Files to patch: $FILES"
            echo "$FILES" | xargs sed -i \
              -e 's|"go/Seq"|"go/Seq1"|g' \
              -e 's|go\.Seq\b|go.Seq1|g' \
              -e 's|"go/Universe"|"go/Universe1"|g' \
              -e 's|go\.Universe\b|go.Universe1|g'
          else
            echo "No additional files need patching"
          fi

      # ── Build gomobile từ source đã patch ─────────────────────────
      - name: Build patched gomobile + gobind
        run: |
          cd $HOME/mobile
          go mod tidy
          go build -o $HOME/go/bin/gomobile ./cmd/gomobile
          go build -o $HOME/go/bin/gobind   ./cmd/gobind
          echo "$HOME/go/bin" >> $GITHUB_PATH
          gomobile version || true

      # ── inject replace vào go.mod psiphon ─────────────────────────
      - name: Inject replace directive into psiphon go.mod
        run: |
          cd $HOME/psiphon-tunnel-core

          # Kiểm tra mobile có trong go.mod không
          if grep -q "golang.org/x/mobile" go.mod; then
            go mod edit -replace=golang.org/x/mobile=$HOME/mobile
            echo "Replaced golang.org/x/mobile"
          else
            echo "golang.org/x/mobile not in go.mod, adding require+replace"
            go mod edit -require=golang.org/x/mobile@v0.0.0
            go mod edit -replace=golang.org/x/mobile=$HOME/mobile
          fi

          go mod tidy || echo "go mod tidy warning (non-fatal)"

          echo "=== go.mod replace section ==="
          grep -A2 "replace" go.mod || true

      # ── gomobile init ─────────────────────────────────────────────
      - name: gomobile init
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018
          cd $HOME/psiphon-tunnel-core/MobileLibrary/psi
          gomobile init

      # ── Build AAR ─────────────────────────────────────────────────
      - name: Build Psiphon AAR
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018
          cd $HOME/psiphon-tunnel-core/MobileLibrary/psi

          gomobile bind \
            -target android/arm64,android/arm,android/386,android/amd64 \
            -androidapi 21 \
            -o $GITHUB_WORKSPACE/psiphon-seq1.aar \
            .

      # ── Verify ────────────────────────────────────────────────────
      - name: Verify AAR contains Seq1
        run: |
          unzip -p psiphon-seq1.aar classes.jar > /tmp/classes.jar
          echo "=== classes in AAR ==="
          jar tf /tmp/classes.jar | grep -E "Seq|Universe|psi|go/"
          echo ""
          jar tf /tmp/classes.jar | grep "Seq1" \
            && echo "✅ go/Seq1 confirmed" \
            || echo "❌ go/Seq1 NOT found — patch failed"

      # ── Upload ────────────────────────────────────────────────────
      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: psiphon-seq1-aar
          path: psiphon-seq1.aar
          
