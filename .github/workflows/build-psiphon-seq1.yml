name: Build Psiphon AAR (go.Seq1)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Clone psiphon-tunnel-core
        run: |
          git clone --depth=1 \
            https://github.com/Psiphon-Labs/psiphon-tunnel-core.git \
            $HOME/psiphon-tunnel-core

      - name: Clone golang.org/x/mobile
        run: |
          git clone --depth=1 \
            https://github.com/golang/mobile.git \
            $HOME/mobile

      # ── Patch mobile: Seq → Seq1 ──────────────────────────────────
      - name: Patch mobile (Seq → Seq1)
        run: |
          cd $HOME/mobile

          find . -name "Seq.java" | while read f; do
            echo "Patching: $f"
            sed -i -e 's/\bclass Seq\b/class Seq1/g' \
                   -e 's/"GoSeq"/"GoSeq1"/g' "$f"
          done

          grep -rl 'go\.Seq\b\|"go/Seq"' . --include="*.go" | while read f; do
            echo "Patching: $f"
            sed -i -e 's|"go/Seq"|"go/Seq1"|g' \
                   -e 's|\bgo\.Seq\b|go.Seq1|g' "$f"
          done

          grep -rl 'go\.Universe\b\|"go/Universe"\|class Universe\b' . --include="*.go" | while read f; do
            echo "Patching: $f"
            sed -i -e 's|"go/Universe"|"go/Universe1"|g' \
                   -e 's|\bgo\.Universe\b|go.Universe1|g' \
                   -e 's|\bclass Universe\b|class Universe1|g' "$f"
          done

          echo "=== Verify ==="
          grep -rn 'go\.Seq[^1]' . --include="*.go" | grep -v "_test.go" \
            || echo "✅ No un-patched go.Seq"

      # ── Tạo wrapper module riêng — tránh đụng go.mod psiphon ─────
      - name: Create wrapper module
        run: |
          mkdir -p $HOME/psi-wrapper
          cd $HOME/psi-wrapper

          # go.mod của wrapper: dùng Go version cũ hơn để tránh tool directive
          cat > go.mod << 'EOF'
module psi-wrapper

go 1.21

require (
    github.com/Psiphon-Labs/psiphon-tunnel-core v0.0.0
    golang.org/x/mobile v0.0.0
)

replace (
    github.com/Psiphon-Labs/psiphon-tunnel-core => /root/psiphon-tunnel-core
    golang.org/x/mobile => /root/mobile
)
EOF

          # Stub go.sum (sẽ được tạo bởi go mod tidy)
          touch go.sum

          # File dummy để module hợp lệ
          cat > main.go << 'EOF'
package main

import _ "github.com/Psiphon-Labs/psiphon-tunnel-core/MobileLibrary/psi"

func main() {}
EOF

          go mod tidy || true
          echo "=== go.mod ==="
          cat go.mod

      # ── Build gomobile + gobind từ source đã patch ────────────────
      - name: Build patched gomobile + gobind
        run: |
          cd $HOME/mobile
          go mod tidy
          go build -o $HOME/go/bin/gomobile ./cmd/gomobile
          go build -o $HOME/go/bin/gobind   ./cmd/gobind
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # ── gomobile init trong wrapper module ────────────────────────
      - name: gomobile init
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018
          cd $HOME/psi-wrapper
          gomobile init

      # ── Build AAR từ wrapper module ───────────────────────────────
      - name: Build Psiphon AAR
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018
          cd $HOME/psi-wrapper

          gomobile bind \
            -target android/arm64,android/arm,android/386,android/amd64 \
            -androidapi 21 \
            -o $GITHUB_WORKSPACE/psiphon-seq1.aar \
            github.com/Psiphon-Labs/psiphon-tunnel-core/MobileLibrary/psi

      # ── Verify ────────────────────────────────────────────────────
      - name: Verify AAR contains Seq1
        run: |
          unzip -p psiphon-seq1.aar classes.jar > /tmp/classes.jar
          echo "=== classes in AAR ==="
          jar tf /tmp/classes.jar | grep -E "Seq|Universe|psi|go/"
          jar tf /tmp/classes.jar | grep "Seq1" \
            && echo "✅ go/Seq1 confirmed" \
            || echo "❌ go/Seq1 NOT found"

      # ── Upload ────────────────────────────────────────────────────
      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: psiphon-seq1-aar
          path: psiphon-seq1.aar
          
