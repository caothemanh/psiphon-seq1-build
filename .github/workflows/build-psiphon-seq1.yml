name: Build Psiphon AAR (go.Seq1)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Clone psiphon-tunnel-core
        run: |
          git clone --depth=1 \
            https://github.com/Psiphon-Labs/psiphon-tunnel-core.git \
            $HOME/psiphon-tunnel-core

      - name: Clone golang.org/x/mobile
        run: |
          git clone --depth=1 \
            https://github.com/golang/mobile.git \
            $HOME/mobile

      - name: Patch mobile (Seq to Seq1 + bypass checks)
        run: |
          cd $HOME/mobile

          find . -name "Seq.java" | while read f; do
            sed -i -e 's/\bclass Seq\b/class Seq1/g' -e 's/"GoSeq"/"GoSeq1"/g' "$f"
          done
          grep -rl 'go\.Seq\b\|"go/Seq"' . --include="*.go" | while read f; do
            sed -i -e 's|"go/Seq"|"go/Seq1"|g' -e 's|\bgo\.Seq\b|go.Seq1|g' "$f"
          done
          grep -rl 'go\.Universe\b\|"go/Universe"\|class Universe\b' . --include="*.go" | while read f; do
            sed -i -e 's|"go/Universe"|"go/Universe1"|g' \
                   -e 's|\bgo\.Universe\b|go.Universe1|g' \
                   -e 's|\bclass Universe\b|class Universe1|g' "$f"
          done
          sed -i 's/func mobileModuleAvailable() bool {/func mobileModuleAvailable() bool { return true \/\//' \
            cmd/gomobile/bind.go

      - name: Build patched gomobile and gobind
        run: |
          cd $HOME/mobile
          go mod tidy
          go build -o $HOME/go/bin/gomobile ./cmd/gomobile
          go build -o $HOME/go/bin/gobind   ./cmd/gobind
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Debug - inspect psi package and gobind behavior
        run: |
          echo "=== psi package files ==="
          ls $HOME/psiphon-tunnel-core/MobileLibrary/psi/

          echo ""
          echo "=== psi.go build tags (first 5 lines each file) ==="
          for f in $HOME/psiphon-tunnel-core/MobileLibrary/psi/*.go; do
            echo "--- $f ---"
            head -5 "$f"
          done

          echo ""
          echo "=== go list psi with android tag ==="
          cd $HOME/psiphon-tunnel-core
          GOOS=android GOARCH=arm64 go list \
            -tags android \
            ./MobileLibrary/psi/ 2>&1 || true

          echo ""
          echo "=== go list exported names ==="
          GOOS=android GOARCH=arm64 go list \
            -tags android \
            -f '{{.GoFiles}}' \
            ./MobileLibrary/psi/ 2>&1 || true

          echo ""
          echo "=== mobile/bind package files ==="
          ls $HOME/mobile/bind/

          echo ""
          echo "=== gobind GOPATH lookup ==="
          go env GOPATH
          go env GOMODCACHE

          echo ""
          echo "=== try gobind directly with verbose ==="
          cd $HOME/psiphon-tunnel-core
          gobind -lang=go,java \
            -outdir=/tmp/gobind-test \
            -tags=android \
            github.com/Psiphon-Labs/psiphon-tunnel-core/MobileLibrary/psi 2>&1 || true

      - name: Upload debug info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-info
          path: /tmp/gobind-test/
          
